<!doctype html>
<html>
	<head>
		<title>Cookie clicker</title>
		<link rel="stylesheet" href="game.css" />
		<script src="game.js"></script>
	</head>
	<body>
		<div id="header">
            <h1>Welcome to the Muffin clicker</h1>
            <p>Have fun!</p>
        </div>
		<div id="shop-icons">
            <div id="money-icon" style="display: contents;">
                <h3 id="money-counter"></h3>
                <img id="money-photo" src="Golden cupcake on a shiny coin.png" alt="money">
            </div>
        </div>
        <div id="click-counter-container">
            <h2 id="click-counter"></h2>
        </div>
		<div id="cookie">
            <img id="muffin-photo" src="Vanilla cupcake with colorful sprinkles.png" alt="Muffin">
        </div>
		<div id="pop-up-message-container">
            <h2 id="pop-up-message"></h2>
        </div>
	</body>
</html>
